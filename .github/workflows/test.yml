name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CPU PyTorch + package + dev deps
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch wheel (avoids the 5 GB CUDA download on CI runners)
          pip install torch numpy scipy \
            --index-url https://download.pytorch.org/whl/cpu
          # Install the package itself plus the dev extra (black, mypy, flake8, isort, pytest)
          pip install -e ".[test]"

      - name: black --check (formatting)
        run: |
          black --check --target-version py310 splatreg/

      - name: mypy (type checking)
        run: |
          mypy splatreg/ --ignore-missing-imports

      - name: pytest (unit tests; GPU paths auto-skip on CPU runners)
        run: |
          # SPLATREG_TEST_DEVICE defaults to "cpu" in conftest.py; no override needed.
          pytest tests/ -q
