name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (CPU)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (CPU torch + package)
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -e . pytest pytest-xdist
      - name: Run test suite (CPU)
        # Optional-backend tests (gsplat/pypose/theseus/gtsam) and the CUDA-only
        # camera-localization tests skip honestly when those deps are absent.
        run: pytest tests/ -q -n auto
