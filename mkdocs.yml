site_name: splatreg
site_description: >-
  Register Gaussian splats — align & merge two 3DGS scans into one SE(3)/Sim(3) frame.
site_url: https://archerkattri.github.io/splatreg/
repo_url: https://github.com/Archerkattri/splatreg
repo_name: Archerkattri/splatreg
docs_dir: docs_site

# No CI: this site is built locally (`mkdocs build`) and deployed manually
# (`mkdocs gh-deploy`, see docs/DEPLOY_DOCS.md).

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - CLI guide: cli.md
  - Init modes: init-modes.md
  - Photometric refinement: photometric.md
  - PLY interop: ply-interop.md
  - Benchmarks: benchmarks.md
  - API reference: api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: false
            show_root_heading: true
            show_root_full_path: true
            separate_signature: true
            show_signature_annotations: false
            merge_init_into_class: true
            members_order: source

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
